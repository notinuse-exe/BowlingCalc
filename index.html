<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bowling Finder</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="bowling-lane-bg">
        <div class="lane">
            <div class="wood-pattern"></div>
            <div class="arrows">
                <div class="arrow"></div>
                <div class="arrow"></div>
                <div class="arrow"></div>
            </div>
            <div class="pins">
                <!-- Decorative pins for ambiance -->
                <div
                    style="width:10px; height:30px; background:#fff; position:absolute; top:-20px; left:20%; border-radius:50%;">
                </div>
                <div
                    style="width:10px; height:30px; background:#fff; position:absolute; top:-20px; left:50%; border-radius:50%;">
                </div>
                <div
                    style="width:10px; height:30px; background:#fff; position:absolute; top:-20px; left:80%; border-radius:50%;">
                </div>
            </div>
        </div>
    </div>

    <div class="app-container">
        <header id="app-header">
            <div class="header-top">
                <h1 class="glow-text">Bowling Finder</h1>
                <div class="toggle-container">
                    <span class="toggle-label">Cosmic Only</span>
                    <label class="switch">
                        <input type="checkbox" id="cosmic-toggle" onchange="toggleCosmic()">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
            <div class="progress-bar" id="progress-container" style="display:none;">
                <div class="progress-fill" id="progress"></div>
            </div>
        </header>

        <main id="wizard-content" class="wizard-content glass-panel">
            <!-- App Content Injected via JS -->
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
